<div class="theme-control">
  <sbi-button
    class="theme-control__toggle"
    [buttonType]="buttonType"
    [ariaLabel]="ariaLabel"
    [ariaPressed]="$ariaPressed()"
    (pressed)="toggleColourMode()"
  >
    <span class="theme-control__viewport" aria-hidden="true">
      <span class="theme-control__reel">
        <span class="theme-control__icon theme-control__icon--sun"></span>
        <span class="theme-control__icon theme-control__icon--moon"></span>
      </span>
    </span>
  </sbi-button>
</div>
