<div class="theme-control">
  <sbi-button
    class="theme-control__toggle"
    [buttonType]="buttonType"
    [ariaPressed]="ariaPressed"
    [class.theme-control__toggle--dark]="darkModeActive"
    (pressed)="toggleColourMode()"
  >
    @if (darkModeActive) {
      <span
        class="theme-control__sr-only"
        i18n="Theme toggle button label|Switches the app from dark mode to light mode@@themeToggleToLightLabel"
      >
        Switch to light mode
      </span>
    } @else {
      <span
        class="theme-control__sr-only"
        i18n="Theme toggle button label|Switches the app from light mode to dark mode@@themeToggleToDarkLabel"
      >
        Switch to dark mode
      </span>
    }

    <span class="theme-control__viewport" aria-hidden="true">
      <span class="theme-control__reel" [class.theme-control__reel--dark]="darkModeActive">
        <span class="theme-control__icon theme-control__icon--sun"></span>
        <span class="theme-control__icon theme-control__icon--moon"></span>
      </span>
    </span>
  </sbi-button>
</div>
