<div class="theme-control">
  <button
    class="theme-control__toggle"
    type="button"
    [attr.aria-pressed]="ariaPressed"
    [class.theme-control__toggle--dark]="darkModeActive"
    (click)="toggleColourMode()"
  >
    @if (darkModeActive) {
      <span
        class="theme-control__sr-only"
        i18n="
          Theme toggle button label|Switches the app from dark mode to light
          mode@@themeToggleToLightLabel"
      >
        Switch to light mode
      </span>
    } @else {
      <span
        class="theme-control__sr-only"
        i18n="
          Theme toggle button label|Switches the app from light mode to dark
          mode@@themeToggleToDarkLabel"
      >
        Switch to dark mode
      </span>
    }

    <span class="theme-control__track" aria-hidden="true">
      <span class="theme-control__icon theme-control__icon--sun"></span>
      <span class="theme-control__icon theme-control__icon--moon"></span>
      <span class="theme-control__thumb"></span>
    </span>
  </button>

  <button
    class="theme-control__reset"
    type="button"
    i18n="Theme reset action|Returns the app theme to the system preference@@themeResetToSystem"
    [disabled]="systemModeActive"
    (click)="resetToSystemMode()"
  >
    Reset to system
  </button>
</div>
