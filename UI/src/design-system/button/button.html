<button
  class="sbi-button"
  type="button"
  [class.sbi-button--secondary]="$variant() === 'secondary'"
  [class.sbi-button--icon-only]="$layout() === 'icon-only'"
  [disabled]="$disabled()"
  [attr.aria-pressed]="$ariaPressed()"
  [attr.aria-label]="$forwardedAriaLabel()"
  [attr.aria-labelledby]="$forwardedAriaLabelledBy()"
  [attr.aria-describedby]="$ariaDescribedBy()"
  [attr.data-testid]="$testId()"
  (click)="handleClick($event)"
>
  <ng-content />
</button>
