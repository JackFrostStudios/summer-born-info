name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  checks: write
  pull-requests: write

jobs:
  build-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore solution
        run: dotnet restore SummerBornInfo.sln
      - name: Build solution with analyzer enforcement
        run: dotnet build SummerBornInfo.sln -c Release --no-restore
      - name: Run tests with coverage and TRX output
        run: >
          dotnet test SummerBornInfo.sln
          -c Release
          --no-build
          --results-directory TestResults
          --report-xunit-trx
          --coverlet
          --coverlet-output-format cobertura
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage
          path: ${{ github.workspace }}/API/TestResults/coverage.cobertura.xml
          retention-days: 5
          if-no-files-found: ignore
      - name: Publish code coverage summary
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        if: always()
        with:
          filename: API/TestResults/coverage.cobertura.xml
          badge: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          fail_below_min: true
          output: both
          thresholds: "90 100"
      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: github.event_name == 'pull_request' && hashFiles('API/TestResults/coverage.cobertura.xml') != ''
        with:
          recreate: true
          path: code-coverage-results.md
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ${{ github.workspace }}/API/TestResults/**/*
          retention-days: 5
          if-no-files-found: ignore
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always() && hashFiles('API/TestResults/**/*.trx') != ''
        with:
          trx_files: ${{ github.workspace }}/API/TestResults/**/*.trx
