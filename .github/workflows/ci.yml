name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  checks: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up dotnet
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x
      - name: Install dotnet-coverage tool
        run: dotnet tool install -g dotnet-coverage
      - name: Restore solution
        run: dotnet restore SummerBornInfo.sln
      - name: Build solution
        run: dotnet build SummerBornInfo.sln -c Release --no-restore
      - name: Run tests
        run: >
          dotnet test SummerBornInfo.sln
          -c Release
          --no-build
          --report-xunit-trx
          --coverlet
          --coverlet-exclude-assemblies-without-sources MissingAny
          --coverlet-output-format cobertura
      - name: Merge Coverage Reports
        run: dotnet coverage merge --reports "**/coverage.cobertura.xml" -f cobertura -o coverage-results/coverage.xml
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: ${{ github.workspace }}/coverage-results/coverage.xml
          retention-days: 5
          if-no-files-found: ignore
      - name: Publish code coverage summary
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: /coverage-results/coverage.xml
          badge: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          fail_below_min: true
          output: both
          thresholds: "80 90"
      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          recreate: true
          path: code-coverage-results.md
      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: ${{ github.workspace }}/**/TestResults/**/*.trx
          retention-days: 5
          if-no-files-found: ignore
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: ${{ github.workspace }}/**/TestResults/**/*.trx
