name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore core projects
        run: |
          dotnet restore SummerBornInfo.Domain/SummerBornInfo.Domain.csproj
          dotnet restore SummerBornInfo.Features/SummerBornInfo.Features.csproj
          dotnet restore SummerBornInfo.Infrastructure/SummerBornInfo.Infrastructure.csproj
          dotnet restore SummerBornInfo.Web/SummerBornInfo.Web.csproj
          dotnet restore SummerBornInfo.Domain.Tests/SummerBornInfo.Domain.Tests.csproj
          dotnet restore SummerBornInfo.Features.Tests/SummerBornInfo.Features.Tests.csproj
          dotnet restore SummerBornInfo.Infrastructure.Tests/SummerBornInfo.Infrastructure.Tests.csproj
          dotnet restore SummerBornInfo.Web.IntegrationTests/SummerBornInfo.Web.Tests.csproj
      - name: Build core projects with analyzer enforcement
        run: |
          dotnet build SummerBornInfo.Domain/SummerBornInfo.Domain.csproj -c Release --no-restore
          dotnet build SummerBornInfo.Features/SummerBornInfo.Features.csproj -c Release --no-restore
          dotnet build SummerBornInfo.Infrastructure/SummerBornInfo.Infrastructure.csproj -c Release --no-restore
          dotnet build SummerBornInfo.Web/SummerBornInfo.Web.csproj -c Release --no-restore
          dotnet build SummerBornInfo.Domain.Tests/SummerBornInfo.Domain.Tests.csproj -c Release --no-restore
          dotnet build SummerBornInfo.Features.Tests/SummerBornInfo.Features.Tests.csproj -c Release --no-restore
          dotnet build SummerBornInfo.Infrastructure.Tests/SummerBornInfo.Infrastructure.Tests.csproj -c Release --no-restore
          dotnet build SummerBornInfo.Web.IntegrationTests/SummerBornInfo.Web.Tests.csproj -c Release --no-restore
