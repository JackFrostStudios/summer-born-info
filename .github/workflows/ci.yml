name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore solution
        run: dotnet restore SummerBornInfo.sln
      - name: Build solution with analyzer enforcement
        run: dotnet build SummerBornInfo.sln -c Release --no-restore
